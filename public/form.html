 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placement Tracker — Application Form</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-gray-900 border-b border-gray-700 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <span class="text-base font-semibold text-gray-100">Placement Tracker</span>
      <div class="flex items-center gap-4">
        <a href="/applications.html" class="text-sm text-gray-400 hover:text-gray-100">Applications</a>
        <a href="/dashboard.html" class="text-sm text-gray-400 hover:text-gray-100">Dashboard</a>
        <button id="logoutBtn" class="text-sm text-red-400 hover:text-red-300">Logout</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-2xl mx-auto px-6 py-8">

    <!-- Page Header -->
    <div class="flex items-center gap-3 mb-6">
      <a href="/applications.html" class="text-gray-400 hover:text-gray-100 text-sm">← Back</a>
      <h1 id="formTitle" class="text-xl font-semibold text-gray-100">Add Application</h1>
    </div>

    <!-- Error Message -->
    <div id="errorMsg"
      class="hidden mb-4 px-4 py-3 bg-red-900 border border-red-700 text-red-300 text-sm rounded">
    </div>

    <!-- Success Message -->
    <div id="successMsg"
      class="hidden mb-4 px-4 py-3 bg-green-900 border border-green-700 text-green-300 text-sm rounded">
    </div>

    <!-- Form -->
    <div class="bg-gray-900 border border-gray-700 rounded-lg p-6">
      <form id="applicationForm" class="space-y-5">

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Company Name *</label>
            <input type="text" id="company_name" placeholder="Google"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Role Title *</label>
            <input type="text" id="role_title" placeholder="Software Engineer Intern"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Applied Date *</label>
            <input type="date" id="applied_date"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Status</label>
            <select id="status"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500">
              <option value="Applied">Applied</option>
              <option value="OA">OA</option>
              <option value="Interview">Interview</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Source</label>
            <input type="text" id="source" placeholder="LinkedIn, Campus, Referral..."
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Salary (LPA)</label>
            <input type="number" id="salary_lpa" placeholder="12.5" step="0.1"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
          </div>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-1">Notes</label>
          <textarea id="notes" rows="3" placeholder="Interview feedback, deadlines, contacts..."
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500 resize-none"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit" id="submitBtn"
            class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-6 py-2 rounded">
            Add Application
          </button>
          <a href="/applications.html"
            class="bg-gray-800 border border-gray-700 text-sm text-gray-300 px-6 py-2 rounded hover:bg-gray-700">
            Cancel
          </a>
        </div>

      </form>
    </div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/form.js"></script>
</body>
</html>
