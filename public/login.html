 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placement Tracker — Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md px-6">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold text-gray-100">Placement Tracker</h1>
      <p class="text-gray-400 text-sm mt-1">Track your applications. Stay on top.</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-700 rounded-lg p-8">

      <!-- Tab Toggle -->
      <div class="flex mb-6 border border-gray-700 rounded-md overflow-hidden">
        <button id="loginTab"
          class="flex-1 py-2 text-sm font-medium bg-indigo-600 text-white">
          Login
        </button>
        <button id="registerTab"
          class="flex-1 py-2 text-sm font-medium text-gray-400 hover:text-gray-100">
          Register
        </button>
      </div>

      <!-- Error Message -->
      <div id="errorMsg"
        class="hidden mb-4 px-4 py-3 bg-red-900 border border-red-700 text-red-300 text-sm rounded">
      </div>

      <!-- Success Message -->
      <div id="successMsg"
        class="hidden mb-4 px-4 py-3 bg-green-900 border border-green-700 text-green-300 text-sm rounded">
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded">
          Login
        </button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="registerForm" class="space-y-4 hidden">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Full Name</label>
          <input type="text" id="registerName" placeholder="Devansh Shukla"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Email</label>
          <input type="email" id="registerEmail" placeholder="you@example.com"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <input type="password" id="registerPassword" placeholder="••••••••"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-indigo-500" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded">
          Create Account
        </button>
      </form>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
